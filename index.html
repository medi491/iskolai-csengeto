<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="app-title">Iskola Csengető telefon</title>
    <link rel="manifest" href="manifest.json">
    <!-- Az Android állapotsorának alapértelmezett színe -->
    <meta name="theme-color" id="theme-meta" content="#f0f2f5">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; transition: background-color 0.3s; }
        
        /* Kisebb és kompaktabb felső kártya */
        .card { background: white; padding: 16px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; margin-bottom: 15px; transition: transform 0.3s; }
        h1 { color: #1a73e8; margin-top: 0; font-size: 1.5rem; margin-bottom: 5px; }
        .time-display { font-size: 2.2rem; font-weight: bold; color: #333; margin: 5px 0; }
        .status { font-size: 1rem; color: #666; margin-bottom: 5px; }
        .bell-active-status { font-size: 1.1rem; font-weight: bold; color: #d32f2f; margin: 5px 0; min-height: 22px; }
        .countdown { font-size: 1.2rem; color: #e53935; font-weight: bold; }
        
        /* Kisebb és vékonyabb hangerő panel */
        .volume-container { margin: 10px 0 5px 0; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .volume-container label { font-size: 0.8rem; color: #555; font-weight: bold; }
        .volume-slider { width: 50%; max-width: 150px; height: 4px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; font-weight: bold; }
        th { background: #f5f5f5; color: #333; font-size: 0.9rem; }
        
        /* Az aktuális óra kiemelt méretű és zöld */
        .current-row { font-size: 1.1rem; color: #2e7d32; background-color: #e8f5e9; border: 2px solid #2e7d32; }
        
        /* A jövőbeli órák kisebbek, de piros színűek és pirosas hátterűek maradtak */
        .future-row { font-size: 0.8rem; color: #c62828; background-color: #ffebee; opacity: 0.9; }

        @keyframes flash-animation {
            0% { background-color: #f0f2f5; }
            50% { background-color: #ffcdd2; }
            100% { background-color: #f0f2f5; }
        }
        .flashing-bg {
            animation: flash-animation 0.8s infinite;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Iskolai Csengető</h1>
        <div id="clock" class="time-display">00:00:00</div>
        <div id="status" class="status">Betöltés...</div>
        <div id="bell-active" class="bell-active-status"></div>
        <div id="countdown" class="countdown">--:--</div>
        
        <div class="volume-container">
            <label for="volume">🔊 Hangerő: <span id="volume-label">50%</span></label>
            <input type="range" id="volume" class="volume-slider" min="0" max="100" value="50" oninput="changeVolume(this.value)">
        </div>
    </div>

    <div class="card">
        <h3>Csengetési Rend</h3>
        <table>
            <thead>
                <tr>
                    <th>Óra</th>
                    <th>Kezdet</th>
                    <th>Vége</th>
                </tr>
            </thead>
            <tbody id="schedule-table">
                <!-- JavaScript tölti fel -->
            </tbody>
        </table>
    </div>

    <!-- Külső, saját helyi MP3 fájlok használata -->
    <audio id="in-bell" src="in.mp3" preload="auto"></audio>
    <audio id="out-bell" src="out.mp3" preload="auto"></audio>

    <script>
        // PWA Service Worker regisztráció (Hogy offline is működjön)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW hiba:", err));
        }

        const schedule = [
            { id: 1, start: "08:00", end: "08:45" },
            { id: 2, start: "08:55", end: "09:40" },
            { id: 3, start: "09:50", end: "10:35" },
            { id: 4, start: "10:55", end: "11:40" },
            { id: 5, start: "11:55", end: "12:40" },
            { id: 6, start: "12:55", end: "13:40" },
            { id: 7, start: "13:55", end: "14:40" },
            { id: 8, start: "14:55", end: "15:40" }
        ];

        const inBellAudio = document.getElementById('in-bell');
        const outBellAudio = document.getElementById('out-bell');
        const tbody = document.getElementById('schedule-table');
        const bellStatusDiv = document.getElementById('bell-active');
        const themeMeta = document.getElementById('theme-meta');
        const appTitle = document.getElementById('app-title');

        let titleFlashInterval = null;
        let isBellActive = false;

        function changeVolume(value) {
            const volumeDecimal = value / 100;
            inBellAudio.volume = volumeDecimal;
            outBellAudio.volume = volumeDecimal;
            document.getElementById('volume-label').innerText = value + "%";
        }

        changeVolume(50);

        function startTitleFlashing(text) {
            if (isBellActive) return; 
            isBellActive = true;
            document.body.classList.add('flashing-bg');
            
            titleFlashInterval = setInterval(() => {
                let showEmoji = (Math.floor(Date.now() / 400) % 2 === 0);
                if (showEmoji) {
                    appTitle.innerText = `🔔 ${text} 🔔`;
                    themeMeta.setAttribute("content", "#ffcdd2");
                } else {
                    appTitle.innerText = `🔕 ${text} 🔕`;
                    themeMeta.setAttribute("content", "#f0f2f5");
                }
            }, 400); 
        }

        // Amikor a hangfájl véget ér, automatikusan leállítja a villogást is
        function stopBellAndVisuals() {
            bellStatusDiv.innerText = "";
            isBellActive = false;
            document.body.classList.remove('flashing-bg');
            clearInterval(titleFlashInterval);
            appTitle.innerText = "Iskola Csengető telefon";
            themeMeta.setAttribute("content", "#f0f2f5");
        }

        // Eseménykezelők: amikor az MP3-nak vége, a villogás is azonnal leáll
        inBellAudio.addEventListener('ended', stopBellAndVisuals);
        outBellAudio.addEventListener('ended', stopBellAndVisuals);

        // Aktiválás első érintésre (Böngésző hanglejátszási korlátozás feloldása)
        document.body.addEventListener('click', function() {
            inBellAudio.play().then(() => { inBellAudio.pause(); }).catch(e => {});
            outBellAudio.play().then(() => { outBellAudio.pause(); }).catch(e => {});
        }, { once: true });

        function updateTableColors(currentMinutes) {
            tbody.innerHTML = ""; 

            schedule.forEach(item => {
                const [sHours, sMinutes] = item.start.split(':').map(Number);
                const [eHours, eMinutes] = item.end.split(':').map(Number);

                const startTotalMin = sHours * 60 + sMinutes;
                const endTotalMin = eHours * 60 + eMinutes;

                let rowClass = "future-row";

                if (currentMinutes >= endTotalMin) {
                    return; 
                } else if (currentMinutes >= startTotalMin && currentMinutes < endTotalMin) {
                    rowClass = "current-row";    
                }

                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td>${item.id}. óra</td>
                        <td>${item.start}</td>
                        <td>${item.end}</td>
                    </tr>
                `;
            });
        }

        function checkTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const currentTimeStr = `${hours}:${minutes}`;
            const currentSeconds = now.getSeconds();
            document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;

            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            updateTableColors(currentMinutes);

            let currentStatus = "Szünet van";
            let nextTargetInMinutes = null;

            for (let item of schedule) {
                const [sHours, sMinutes] = item.start.split(':').map(Number);
                const [eHours, eMinutes] = item.end.split(':').map(Number);
                const startTotal = sHours * 60 + sMinutes;
                const endTotal = eHours * 60 + eMinutes;

                // Pontos másodperces csengetési trigger
                if (currentSeconds === 0 && !isBellActive) {
                    if (currentTimeStr === item.start) {
                        bellStatusDiv.innerText = "BECSENGETÉS!";
                        startTitleFlashing("BECSENGETÉS");
                        inBellAudio.play().catch(e => {
                            console.log("Hiba:", e);
                            stopBellAndVisuals();
                        });
                    } else if (currentTimeStr === item.end) {
                        bellStatusDiv.innerText = "KICSENGETÉS!";
                        startTitleFlashing("KICSENGETÉS");
                        outBellAudio.play().catch(e => {
                            console.log("Hiba:", e);
                            stopBellAndVisuals();
                        });
                    }
                }

                if (currentMinutes >= startTotal && currentMinutes < endTotal) {
                    currentStatus = `${item.id}. óra tart`;
                    nextTargetInMinutes = endTotal;
                    break;
                } else if (currentMinutes < startTotal) {
                    currentStatus = `Szünet van (${item.id}. óra előtt)`;
                    nextTargetInMinutes = startTotal;
                    break;
                }
            }

            document.getElementById('status').innerText = currentStatus;

            if (nextTargetInMinutes !== null) {
                const diffMinutes = nextTargetInMinutes - currentMinutes - 1;
                const diffSeconds = 60 - currentSeconds;
                
                if (diffSeconds === 60) {
                    document.getElementById('countdown').innerText = `${String(diffMinutes + 1).padStart(2, '0')}:00`;
                } else {
                    document.getElementById('countdown').innerText = `${String(diffMinutes).padStart(2, '0')}:${String(diffSeconds).padStart(2, '0')}`;
                }
            } else {
                document.getElementById('countdown').innerText = "--:--";
                document.getElementById('status').innerText = "Tanítás véget ért";
            }
        }

        setInterval(checkTime, 1000);
        checkTime();
    </script>
</body>
</html>
